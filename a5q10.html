<html>
<head>
<title>a5q10</title>
</head>
<body>
<script>
function separateEvenOdd(arr) {
  const evens = arr.filter(num => num % 2 === 0);
  const odds = arr.filter(num => num % 2 !== 0);

  return { evens, odds };
}

const numbers = [1, 2, 3, 4, 5, 6, 7, 8];
const result = separateEvenOdd(numbers);

document.write("Evens:", result.evens); // [2, 4, 6, 8]
document.write("Odds:", result.odds);   // [1, 3, 5, 7]
</script>
</body>
</html>
