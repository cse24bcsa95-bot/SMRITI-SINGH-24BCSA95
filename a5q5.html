<script>
function getSecondLargest(arr) {
    let n = arr.length;
    arr.sort((a, b) => a - b)
    for (let i = n - 2; i >= 0; i--) {
      
       
        if (arr[i] !== arr[n - 1]) {
            return arr[i];
        }
    }
}

const arr = [12, 35, 1, 10, 34, 1]
document.write(getSecondLargest(arr));
</script>
